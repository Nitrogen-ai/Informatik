function generatePlan() {
  const focus = document.getElementById('focus').value;
  const status = document.getElementById('status').value;
  const level = document.getElementById('level').value;
  const days = parseInt(document.getElementById('days').value);
  const isInjured = status === 'injury';
  const data = db[focus];
  const levelText = { kreis:"Kreisklasse / Hobby", bezirk:"Bezirks- bis Landesliga", pro:"Leistungsbereich / Pro" }[level];
  const variantSets = isInjured ? null : data.exercises[level];

  let html = '';

  if (isInjured) {
    html += `<div class="sc-warn"><strong>Aufbautraining-Modus aktiv:</strong> Dieser Plan wurde gelenkschonend angepasst. Stoppe sofort bei Schmerzen und besprich das Training mit deinem Arzt oder Physiotherapeuten.</div>`;
  }

  html += `<div class="sc-meta">
    <strong>Fokus:</strong> ${data.title}<br>
    <strong>Status:</strong> ${isInjured ? "Rehabilitation / Aufbau" : "Voll einsatzbereit"}<br>
    <strong>Niveau:</strong> ${levelText}
  </div>`;

  for (let i = 0; i < days; i++) {
    const variantIdx = i % 3;
    const exList = isInjured ? injuryMods[focus] : variantSets[variantIdx];
    const dayLabel = isInjured ? "Schonende Aufbau-Einheit" : "Fokus-Einheit";

    html += `<div class="sc-day">
      <div class="sc-day-title">Tag ${i + 1}: ${dayLabel}</div>`;

    exList.forEach(ex => {
      const name = isInjured ? ex : ex.name;
      const link = isInjured
        ? ytLink(encodeURIComponent(name.substring(0, 40)))
        : ytLink(ex.v);
      html += `<div class="sc-ex">
        <span class="sc-dot">●</span>
        <span class="sc-ex-name">${name}</span>
        <a href="${link}" target="_blank" class="sc-vbtn">▶ Video</a>
      </div>`;
    });

    html += `</div>`;

    if (i < days - 1) {
      html += `<div class="sc-rest">
        <div class="sc-rest-title">Zwischentag: Regeneration</div>
        <div class="sc-rest-text">${isInjured
          ? "Fokus auf Blackroll, leichtes Dehnen und physikalische Therapie. Keine Belastung."
          : "Faszienrolle, leichtes Dehnen oder kompletter Ruhetag — Muskelkater vorbeugen."
        }</div>
      </div>`;
    }
  }

  document.getElementById('result').innerHTML = html;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}
</script>
